openapi: 3.0.0
info:
  title: Orders API
  version: 1.0.0
  description: API for managing orders and order processing
tags:
  - name: OrdersService
    description: Operations related to managing orders
paths:
  /api/orders:
    get:
      tags:
        - OrdersService
      summary: Get list of orders
      responses:
        "200":
          description: Successful response with orders data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      tags:
        - OrdersService
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input
  /api/orders/{id}:
    get:
      tags:
        - OrdersService
      summary: Get order details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response with order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
components:
  schemas:
    OrderItem:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0
    Order:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        shippingAddress:
          type: string
        orderDate:
          type: string
          format: date-time
        estimatedDelivery:
          type: string
          format: date-time
    OrderInput:
      type: object
      required:
        - customerId
        - customerName
        - items
        - total
        - shippingAddress
      properties:
        customerId:
          type: string
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
          minimum: 0
        shippingAddress:
          type: string
        estimatedDelivery:
          type: string
          format: date-time
