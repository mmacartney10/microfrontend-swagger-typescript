openapi: 3.0.0
info:
  title: Products API
  version: 1.0.0
  description: API for managing products and inventory
tags:
  - name: ProductsService
    description: Operations related to managing products
paths:
  /api/products:
    get:
      tags:
        - ProductsService
      summary: Get list of products
      responses:
        "200":
          description: Successful response with products data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags:
        - ProductsService
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid input
  /api/products/{id}:
    get:
      tags:
        - ProductsService
      summary: Get a specific product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response with product data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        inStock:
          type: boolean
        imageUrl:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    ProductInput:
      type: object
      required:
        - name
        - description
        - price
        - category
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
        category:
          type: string
        inStock:
          type: boolean
          default: true
        imageUrl:
          type: string
        tags:
          type: array
          items:
            type: string
