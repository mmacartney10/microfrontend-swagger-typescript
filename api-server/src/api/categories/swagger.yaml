openapi: 3.0.0
info:
  title: Categories API
  version: 1.0.0
  description: API for managing categories and classification
tags:
  - name: CategoriesService
    description: Operations related to managing categories
paths:
  /api/categories:
    get:
      tags:
        - CategoriesService
      summary: Get list of categories
      responses:
        "200":
          description: Successful response with categories data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      tags:
        - CategoriesService
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid input
  /api/categories/{id}:
    delete:
      tags:
        - CategoriesService
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
        icon:
          type: string
        color:
          type: string
        productCount:
          type: integer
        active:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
    CategoryInput:
      type: object
      required:
        - name
        - description
        - color
      properties:
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
        icon:
          type: string
        color:
          type: string
        active:
          type: boolean
          default: true
        sortOrder:
          type: integer
